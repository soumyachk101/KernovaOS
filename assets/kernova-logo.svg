<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kernova">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#ffe9a8"/>
      <stop offset="70%" stop-color="#ff8a3d"/>
      <stop offset="100%" stop-color="#d6289b"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9a3d" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#c026d3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0b1020" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ringB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#ffe9a8"/>
      <stop offset="100%" stop-color="#ff8a3d"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="3.5s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="wordclip"><text x="240" y="128" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="70" font-weight="800" letter-spacing="1">KERNOVA</text></clipPath>
  </defs>

  <!-- space panel: reads on light and dark themes -->
  <rect x="0" y="0" width="800" height="240" rx="24" fill="#0b1020"/>
  <rect x="0.75" y="0.75" width="798.5" height="238.5" rx="23.25" fill="none" stroke="#1e293b"/>

  <!-- twinkling starfield -->
  <g fill="#cbd5e1">
    <circle cx="470" cy="40" r="1.5"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="180" r="1.3"><animate attributeName="opacity" values="1;0.25;1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="300" cy="46" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="70" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="200" r="1.2"><animate attributeName="opacity" values="0.25;1;0.25" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="150" r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="190" r="1.2"><animate attributeName="opacity" values="1;0.3;1" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- supernova system -->
  <g transform="translate(120,120)">
    <!-- pulsing halo -->
    <circle cx="0" cy="0" r="90" fill="url(#halo)">
      <animate attributeName="r" values="80;96;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- burst rays (slow rotate + shimmer) -->
    <g stroke="url(#core)" stroke-width="3" stroke-linecap="round" filter="url(#soft)">
      <g>
        <line x1="0" y1="-70" x2="0" y2="-40"/><line x1="0" y1="70" x2="0" y2="40"/>
        <line x1="-70" y1="0" x2="-40" y2="0"/><line x1="70" y1="0" x2="40" y2="0"/>
        <line x1="-50" y1="-50" x2="-28" y2="-28"/><line x1="50" y1="50" x2="28" y2="28"/>
        <line x1="50" y1="-50" x2="28" y2="-28"/><line x1="-50" y1="50" x2="-28" y2="28"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </g>
    </g>

    <!-- orbit ring A -->
    <g>
      <ellipse cx="0" cy="0" rx="74" ry="26" fill="none" stroke="url(#ringA)" stroke-width="3" transform="rotate(-22)"/>
      <circle cx="74" cy="0" r="4.5" fill="#67e8f9" transform="rotate(-22)">
        <animateMotion dur="6s" repeatCount="indefinite" rotate="auto"
          path="M 74 0 A 74 26 0 1 1 -74 0 A 74 26 0 1 1 74 0"/>
      </circle>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
    </g>
    <!-- orbit ring B (opposite) -->
    <g>
      <ellipse cx="0" cy="0" rx="66" ry="22" fill="none" stroke="url(#ringB)" stroke-width="2.5" transform="rotate(28)" opacity="0.85"/>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="24s" repeatCount="indefinite"/>
    </g>

    <!-- core -->
    <circle cx="0" cy="0" r="30" fill="url(#core)">
      <animate attributeName="r" values="28;32;28" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="11" fill="#fffef2">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- wordmark + moving sheen -->
  <text x="240" y="128" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="70" font-weight="800" fill="url(#word)" letter-spacing="1">KERNOVA</text>
  <g clip-path="url(#wordclip)">
    <rect x="240" y="70" width="360" height="70" fill="url(#sheen)"/>
  </g>
  <text x="243" y="164" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace" font-size="16" fill="#7dd3fc" letter-spacing="4">x86-64 · RUST · no_std · QEMU</text>

  <!-- thin animated underline -->
  <rect x="243" y="178" width="0" height="3" rx="1.5" fill="url(#ringA)">
    <animate attributeName="width" values="0;340;340" keyTimes="0;0.6;1" dur="2.4s" fill="freeze"/>
  </rect>
</svg>
