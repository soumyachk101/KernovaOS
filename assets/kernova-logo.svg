<svg width="640" height="200" viewBox="0 0 640 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kernova">
  <defs>
    <radialGradient id="nova" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e6"/>
      <stop offset="30%" stop-color="#ffd166"/>
      <stop offset="65%" stop-color="#ff7b3d"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="55%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff7b3d"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded space panel: reads on light and dark GitHub themes -->
  <rect x="0" y="0" width="640" height="200" rx="20" fill="#0b1020"/>
  <rect x="0.5" y="0.5" width="639" height="199" rx="19.5" fill="none" stroke="#1e293b"/>

  <!-- scattered stars -->
  <g fill="#cbd5e1" opacity="0.7">
    <circle cx="360" cy="34" r="1.4"/><circle cx="420" cy="150" r="1.2"/>
    <circle cx="150" cy="160" r="1.3"/><circle cx="470" cy="60" r="1.5"/>
    <circle cx="560" cy="120" r="1.2"/><circle cx="250" cy="40" r="1.1"/>
    <circle cx="600" cy="40" r="1.3"/><circle cx="520" cy="165" r="1.2"/>
  </g>

  <!-- supernova mark -->
  <g transform="translate(100,100)" filter="url(#glow)">
    <!-- orbital ring (the "kernel" loop) -->
    <ellipse cx="0" cy="0" rx="58" ry="22" fill="none" stroke="url(#ring)" stroke-width="3" transform="rotate(-24)"/>
    <!-- burst spokes -->
    <g stroke="url(#nova)" stroke-width="3.2" stroke-linecap="round">
      <line x1="0" y1="-56" x2="0" y2="-30"/>
      <line x1="0" y1="56" x2="0" y2="30"/>
      <line x1="-56" y1="0" x2="-30" y2="0"/>
      <line x1="56" y1="0" x2="30" y2="0"/>
      <line x1="-40" y1="-40" x2="-21" y2="-21"/>
      <line x1="40" y1="40" x2="21" y2="21"/>
      <line x1="40" y1="-40" x2="21" y2="-21"/>
      <line x1="-40" y1="40" x2="-21" y2="21"/>
    </g>
    <!-- core -->
    <circle cx="0" cy="0" r="26" fill="url(#nova)"/>
    <circle cx="0" cy="0" r="10" fill="#fff7e6"/>
  </g>

  <!-- wordmark -->
  <text x="210" y="108" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="58" font-weight="800" fill="url(#word)" letter-spacing="1">KERNOVA</text>
  <text x="212" y="140" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace" font-size="16" fill="#7dd3fc" letter-spacing="3">x86-64 · RUST · no_std · QEMU</text>
</svg>
